apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flask-production
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s/production/flask
  prune: true
  sourceRef:
    kind: GitRepository
    name: flask-repo-production
  targetNamespace: production
  timeout: 2m
  retryInterval: 30s