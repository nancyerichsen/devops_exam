apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flask-staging
  namespace: flux-system
spec:
  interval: 1m
  path: ./k8s/staging/flask
  prune: true
  sourceRef:
    kind: GitRepository
    name: flask-repo-staging
  targetNamespace: staging
  timeout: 2m
  retryInterval: 30s